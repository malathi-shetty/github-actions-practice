name: Matrix Build with Fail-Fast

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  exclude-fail-fast:
    runs-on: ${{ matrix.os }}

    strategy:
      # Continue running other jobs even if one fails
      fail-fast: false

      matrix:
        os:
          - windows-latest
          - ubuntu-latest

        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

        # Exclude Python 3.10 on Windows
        exclude:
          - os: windows-latest
            python-version: "3.10"

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Step 3: Print Python version
      - name: Print Python Version
        run: python --version

      # Step 4: Print matrix details
      - name: Print environment details
        run: |
          echo "Operating System : ${{ matrix.os }}"
          echo "Python Version   : ${{ matrix.python-version }}"

      # Step 5: Intentionally fail one specific job
      - name: Simulate failure
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        run: |
          echo "Simulating failure on Ubuntu + Python 3.11"
          exit 1

      # Step 6: Simulated test run
      - name: Run tests
        run: |
          echo "Running tests..."
          python -c "print('All tests passed ✅')"
